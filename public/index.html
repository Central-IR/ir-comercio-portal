<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="IR ICONE.png">
    <title>Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>

/* ════════════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════════════ */
:root {
    --primary:        #ff521d;
    --primary-dim:    rgba(255,82,29,0.12);
    --primary-glow:   rgba(255,82,29,0.30);

    /* Light */
    --bg:             #F2F3F5;
    --surface:        #FFFFFF;
    --surface-2:      #F7F8FA;
    --border:         rgba(0,0,0,0.07);
    --border-md:      rgba(0,0,0,0.11);
    --text:           #111111;
    --text-2:         #5A6073;
    --text-3:         #9BA3B5;
    --sidebar-bg:     #FFFFFF;
    --sidebar-border: rgba(0,0,0,0.07);
    --topbar-bg:      #FFFFFF;

    --red:        #E84040;
    --red-dim:    rgba(232,64,64,0.10);
    --green:      #22C55E;
    --green-dim:  rgba(34,197,94,0.10);
    --blue:       #3B82F6;
    --blue-dim:   rgba(59,130,246,0.10);

    --radius:     8px;
    --radius-lg:  12px;
    --radius-xl:  16px;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg:             #0D0D0F;
        --surface:        #161618;
        --surface-2:      #1C1C1F;
        --border:         rgba(255,255,255,0.06);
        --border-md:      rgba(255,255,255,0.10);
        --text:           #F0F0F2;
        --text-2:         #8A909E;
        --text-3:         #4E5464;
        --sidebar-bg:     #111113;
        --sidebar-border: rgba(255,255,255,0.05);
        --topbar-bg:      #111113;
        --red-dim:        rgba(232,64,64,0.14);
        --green-dim:      rgba(34,197,94,0.12);
        --blue-dim:       rgba(59,130,246,0.12);
    }
}

/* ════════════════════════════════════════════════════
   RESET
════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ════════════════════════════════════════════════════
   LOGIN — INTACTO (nenhuma alteração)
════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap');

.login-screen {
    width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    background: linear-gradient(160deg, #f4f6f8 0%, #eef0f3 100%);
    font-family: 'DM Sans', sans-serif;
}
.login-line { position:absolute; pointer-events:none; z-index:0; }
.login-line-h {
    left:-100%; width:100%; height:1px;
    background: linear-gradient(90deg,transparent 0%,rgba(255,82,29,0.25) 35%,rgba(255,82,29,0.38) 50%,rgba(255,82,29,0.25) 65%,transparent 100%);
    animation: lineSlideH linear infinite;
}
.login-line-v {
    top:-100%; height:100%; width:1px;
    background: linear-gradient(180deg,transparent 0%,rgba(255,82,29,0.25) 35%,rgba(255,82,29,0.38) 50%,rgba(255,82,29,0.25) 65%,transparent 100%);
    animation: lineSlideV linear infinite;
}
.login-line-h:nth-child(1){top:15%;animation-delay:0s;animation-duration:10s}
.login-line-h:nth-child(2){top:47%;animation-delay:-4s;animation-duration:13s}
.login-line-h:nth-child(3){top:80%;animation-delay:-7s;animation-duration:9s}
.login-line-v:nth-child(4){left:15%;animation-delay:-2s;animation-duration:11s}
.login-line-v:nth-child(5){left:55%;animation-delay:-6s;animation-duration:14s}
.login-line-v:nth-child(6){left:82%;animation-delay:-9s;animation-duration:10s}
@keyframes lineSlideH{from{transform:translateX(0)}to{transform:translateX(200%)}}
@keyframes lineSlideV{from{transform:translateY(0)}to{transform:translateY(200%)}}

.login-form-area {
    position:relative; z-index:20; width:100%; padding:0;
    display:flex; flex-direction:column; align-items:center;
}
.login-logo-wrapper {
    display:flex; align-items:center; justify-content:center;
    margin-top:0.4rem; margin-bottom:1rem;
    animation: portalFadeIn 1.8s ease forwards;
}
.login-logo-light,.login-logo-dark{height:auto;display:block}
.login-logo-light{max-width:185px;display:block}
.login-logo-dark {max-width:148px;display:none}
@media(prefers-color-scheme:dark){.login-logo-light{display:none}.login-logo-dark{display:block}}
@keyframes portalFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.login-portal-sub {
    font-size:.72rem; font-weight:500; letter-spacing:.06em;
    color:#6B7280; text-align:center; text-transform:uppercase;
    margin-bottom:.5rem; animation: portalFadeIn 1.8s ease 0.15s both;
}
.login-portal-headline {
    font-size:.85rem; font-weight:700; letter-spacing:.08em;
    color:#374151; text-align:center; text-transform:uppercase;
    margin-bottom:2rem; animation: portalFadeIn 1.8s ease 0.25s both;
}
.login-fields{width:100%}
.form-group{margin-bottom:1.4rem}
label {
    display:block; margin-bottom:.4rem; font-weight:500;
    color:#6b7280; font-size:.78rem; text-transform:uppercase; letter-spacing:.07em;
}
input {
    width:100%; padding:12px 15px;
    border:1.5px solid #c8cdd6; border-radius:8px;
    background:#f7f8fa; color:#111111; font-size:.92rem;
    font-family:'DM Sans',sans-serif;
    transition:border-color .2s ease,box-shadow .2s ease;
    box-shadow:0 1px 4px rgba(0,0,0,.07);
}
input::placeholder{color:#adb3bd}
input:focus{outline:none;border-color:#F97316;background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.12)}
.password-container{position:relative}
.toggle-password {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    font-size:.67rem; color:#9ca3af; font-weight:600;
    letter-spacing:.05em; text-transform:uppercase;
    font-family:'DM Sans',sans-serif; padding:4px 6px;
    transition:color .2s;
}
.toggle-password:hover{color:var(--primary)}
.btn-login {
    width:100%; padding:15px; background:var(--primary);
    color:#fff; border:none; border-radius:8px;
    font-size:.88rem; font-weight:700; font-family:'DM Sans',sans-serif;
    cursor:pointer; transition:background .2s ease,transform .2s ease,box-shadow .2s ease;
    text-transform:uppercase; letter-spacing:.1em; margin-top:1rem;
    position:relative; overflow:hidden;
}
.btn-login::before {
    content:''; position:absolute; top:0; left:-100%;
    width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
    transition:left .45s ease;
}
.btn-login:hover:not(:disabled)::before{left:100%}
.btn-login:hover:not(:disabled){background:#e8451a;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,82,29,.35)}
.btn-login:active:not(:disabled){transform:translateY(0)}
.btn-login:disabled{opacity:.45;cursor:not-allowed}
.message {
    position:absolute; top:-3.8rem; left:1.5rem; right:1.5rem;
    padding:9px 13px; border-radius:8px; font-size:.82rem; font-weight:500;
    opacity:0; transform:translateY(4px); pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;
}
.message.show{opacity:1;transform:translateY(0);pointer-events:auto}
.message.error{background:#EF4444;border:none;color:#fff;font-weight:700}
.login-version-footer {
    position:absolute; bottom:1.4rem; left:0; right:0;
    text-align:center; font-size:.7rem; font-weight:500;
    color:#b0b7c3; letter-spacing:.04em; pointer-events:none; z-index:20;
}
.login-card {
    background:#fff; border-radius:20px;
    box-shadow:0 4px 6px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.10);
    padding:2.8rem 2.4rem 2.4rem;
    width:100%; max-width:420px; position:relative; z-index:20;
    animation:portalFadeIn .6s ease forwards;
}
.input-icon-wrapper{position:relative}
.input-icon {
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:18px; height:18px;
    display:flex; align-items:center; justify-content:center;
    color:#adb3bd; pointer-events:none; transition:color .2s ease;
}
.input-icon svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.input-icon-wrapper:focus-within .input-icon{color:#F97316}
.btn-spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid rgba(255,255,255,.35); border-top-color:#fff;
    border-radius:50%; animation:splashSpin .7s linear infinite;
    vertical-align:middle; margin-right:6px;
}
@media(prefers-color-scheme:dark){
    .login-screen{background:linear-gradient(160deg,#0c0c0e 0%,#111114 100%)}
    .login-card{background:#1a1a1a;box-shadow:0 4px 6px rgba(0,0,0,.2),0 12px 40px rgba(0,0,0,.4)}
    .input-icon{color:rgba(255,255,255,.25)}
    .login-version-footer{color:rgba(255,255,255,.18)}
    .login-portal-sub{color:rgba(255,255,255,.3)}
    .login-portal-headline{color:rgba(255,255,255,.7)}
    label{color:rgba(255,255,255,.4)}
    input{background:#2a2a2a;border:1.5px solid rgba(255,255,255,.22);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
    input::placeholder{color:rgba(255,255,255,.35)}
    input:focus{border-color:rgba(255,82,29,.55);background:rgba(255,255,255,.07);box-shadow:0 0 0 3px rgba(255,82,29,.10)}
    .toggle-password{color:rgba(255,255,255,.28)}
    .message.error{background:#EF4444;border:none;color:#fff;font-weight:700}
    .login-line-h{background:linear-gradient(90deg,transparent 0%,rgba(255,82,29,.18) 35%,rgba(255,82,29,.28) 50%,rgba(255,82,29,.18) 65%,transparent 100%)}
    .login-line-v{background:linear-gradient(180deg,transparent 0%,rgba(255,82,29,.18) 35%,rgba(255,82,29,.28) 50%,rgba(255,82,29,.18) 65%,transparent 100%)}
}
@media(max-width:480px){.login-form-area{padding:0 1.25rem}.login-logo-wrapper img{max-width:170px}}

/* ════════════════════════════════════════════════════
   SPLASH
════════════════════════════════════════════════════ */
.splash-welcome {
    position:fixed; inset:0;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    z-index:99999;
}
@keyframes splashSpin{to{transform:rotate(360deg)}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.splash-spinner {
    width:44px; height:44px;
    border:3px solid rgba(255,82,29,.15);
    border-top-color:var(--primary);
    border-radius:50%;
    animation:splashSpin .8s linear infinite;
}

/* ════════════════════════════════════════════════════
   DASHBOARD SHELL
════════════════════════════════════════════════════ */
.dashboard-screen { display:none; height:100vh; overflow:hidden; }
.dashboard-container { display:flex; height:100vh; overflow:hidden; }

/* ════════════════════════════════════════════════════
   TOPBAR
════════════════════════════════════════════════════ */
.topbar {
    height:52px; min-height:52px;
    background:var(--topbar-bg);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center;
    padding:0 20px 0 0;
    gap:0; flex-shrink:0;
    position:relative; z-index:50;
}

.topbar-toggle {
    width:52px; height:52px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border:none; background:none;
    color:var(--text-2);
    transition:color .15s, background .15s;
    border-radius:0;
}
.topbar-toggle:hover { background:var(--surface-2); color:var(--text); }
.topbar-toggle svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }

.topbar-brand {
    display:flex; align-items:center; gap:10px;
    padding:0 16px 0 4px;
    border-right:1px solid var(--border);
    height:100%; flex-shrink:0;
}
.topbar-brand-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--primary);
    box-shadow:0 0 8px rgba(255,82,29,.5);
    flex-shrink:0;
}
.topbar-brand-name {
    font-size:13px; font-weight:700;
    letter-spacing:.04em; color:var(--text);
    text-transform:uppercase;
    white-space:nowrap;
}
.topbar-breadcrumb {
    padding:0 16px;
    font-size:12.5px;
    color:var(--text-3);
    font-weight:500;
    flex:1;
}
.topbar-breadcrumb span { color:var(--text-2); }

.topbar-user {
    display:flex; align-items:center; gap:10px;
    margin-left:auto;
    padding:0 0 0 16px;
    border-left:1px solid var(--border);
    height:100%;
}
.topbar-user-name {
    font-size:12.5px; font-weight:600;
    color:var(--text-2); white-space:nowrap;
}
.topbar-avatar {
    width:30px; height:30px; border-radius:50%;
    background:var(--primary);
    color:#fff; font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; text-transform:uppercase;
}
.topbar-logout {
    height:52px; padding:0 16px;
    display:flex; align-items:center; gap:7px;
    cursor:pointer; border:none; background:none;
    color:var(--red); font-size:12.5px; font-weight:600;
    font-family:inherit;
    border-left:1px solid var(--border);
    transition:background .15s;
}
.topbar-logout:hover { background:var(--red-dim); }
.topbar-logout svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* ════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════ */
.main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

.body-row { flex:1; display:flex; overflow:hidden; }

.sidebar {
    background:var(--sidebar-bg);
    border-right:1px solid var(--sidebar-border);
    display:flex; flex-direction:column;
    flex-shrink:0; height:100%;
    overflow:hidden;
    width:52px;
    transition:width .3s cubic-bezier(.4,0,.2,1);
    position:relative; z-index:40;
}
.sidebar.expanded { width:240px; }

/* nav label text */
.sidebar .nav-label {
    opacity:0; white-space:nowrap;
    transition:opacity .18s ease;
    font-size:13px;
}
.sidebar.expanded .nav-label { opacity:1; }

/* section label */
.sidebar-section {
    padding:16px 14px 4px;
    font-size:9.5px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-3);
    white-space:nowrap; overflow:hidden;
    opacity:0; height:0; transition:opacity .18s, height .2s;
}
.sidebar.expanded .sidebar-section { opacity:1; height:28px; }

.sidebar-scroller {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:8px 6px;
    scrollbar-width:thin; scrollbar-color:transparent transparent;
}
.sidebar.expanded .sidebar-scroller { scrollbar-color:rgba(128,128,128,.3) transparent; }
.sidebar-scroller::-webkit-scrollbar{width:4px}
.sidebar-scroller::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
.sidebar.expanded .sidebar-scroller::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25)}

.nav-item {
    display:flex; align-items:center;
    gap:12px; padding:9px 10px;
    border-radius:var(--radius); cursor:pointer;
    color:var(--text-2); font-weight:500;
    border:1px solid transparent;
    transition:background .14s, color .14s, border-color .14s;
    position:relative; overflow:hidden;
    white-space:nowrap; user-select:none;
    min-height:38px;
}
.nav-item:hover { background:var(--surface-2); color:var(--text); }
.nav-item.active {
    background:var(--primary-dim);
    color:var(--primary);
    border-color:rgba(255,82,29,.2);
    font-weight:600;
}

/* tooltip when collapsed */
.sidebar:not(.expanded) .nav-item { justify-content:center; padding:9px; }
.sidebar:not(.expanded) .nav-item[data-tooltip]:hover::after {
    content:attr(data-tooltip);
    position:absolute; left:calc(100% + 10px); top:50%;
    transform:translateY(-50%);
    background:var(--surface); color:var(--text);
    border:1px solid var(--border-md);
    padding:5px 10px; border-radius:6px;
    font-size:12px; font-weight:500;
    white-space:nowrap; pointer-events:none;
    box-shadow:0 4px 16px rgba(0,0,0,.12);
    z-index:200;
}

.nav-icon {
    width:18px; height:18px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
}
.nav-icon svg {
    width:100%; height:100%;
    stroke:currentColor; fill:none;
    stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;
}

.sidebar-footer {
    padding:6px; flex-shrink:0;
    border-top:1px solid var(--border);
}
.sidebar-footer .nav-item { color:var(--red); }
.sidebar-footer .nav-item:hover { background:var(--red-dim); color:var(--red); }
.sidebar.expanded .sidebar-footer .nav-item { justify-content:flex-start; }

/* badge novo */
.badge-new {
    display:inline-flex; align-items:center; justify-content:center;
    background:#1E40AF; color:#fff;
    font-size:.52rem; font-weight:700; letter-spacing:.04em;
    padding:1px 5px; border-radius:4px; line-height:1.5;
    vertical-align:middle; margin-left:6px; flex-shrink:0;
    opacity:0; transition:opacity .18s;
}
.sidebar.expanded .badge-new { opacity:1; }

/* ════════════════════════════════════════════════════
   CONTENT AREA
════════════════════════════════════════════════════ */
.content-area {
    flex:1; overflow:hidden; display:flex; flex-direction:column;
    position:relative;
}

/* ── WELCOME ── */
.welcome-screen {
    position:absolute; inset:0;
    overflow-y:auto; overflow-x:hidden;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:40px 32px;
    gap:36px;
    opacity:1; visibility:visible;
    transition:opacity .3s ease, visibility .3s ease;
    z-index:10;
    background:var(--bg);
}
.welcome-screen.hidden-smooth { opacity:0; visibility:hidden; pointer-events:none; }

.welcome-header { text-align:center; }
.welcome-greeting {
    font-size:22px; font-weight:700;
    color:var(--text); letter-spacing:-.3px;
    margin-bottom:4px;
}
.welcome-sub {
    font-size:13px; color:var(--text-3); font-weight:400;
}

/* MODULE GRID */
.welcome-modules-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(148px, 1fr));
    gap:12px;
    width:100%; max-width:900px;
}

.welcome-module-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:22px 16px 20px;
    display:flex; flex-direction:column;
    align-items:center; gap:10px;
    cursor:pointer; text-align:center;
    transition:border-color .18s, box-shadow .18s, transform .18s;
    position:relative; overflow:hidden;
    user-select:none;
}
.welcome-module-card::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0;
    height:2px;
    background:var(--primary);
    transform:scaleX(0); transform-origin:left;
    transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.welcome-module-card:hover::after { transform:scaleX(1); }
.welcome-module-card:hover {
    border-color:rgba(255,82,29,.3);
    box-shadow:0 4px 24px rgba(255,82,29,.10);
    transform:translateY(-2px);
}
.welcome-module-card:active { transform:translateY(0); }
.welcome-module-card.unavailable { opacity:.35; cursor:not-allowed; pointer-events:none; }

.card-icon-wrap {
    width:40px; height:40px;
    background:var(--surface-2);
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    color:var(--text-2);
    transition:background .18s, color .18s;
}
.welcome-module-card:hover .card-icon-wrap {
    background:var(--primary-dim);
    color:var(--primary);
}
.card-icon-wrap svg {
    width:20px; height:20px;
    stroke:currentColor; fill:none;
    stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round;
}
.card-label {
    font-size:12.5px; font-weight:600;
    color:var(--text-2); line-height:1.35;
    transition:color .18s;
}
.welcome-module-card:hover .card-label { color:var(--text); }

/* ── IFRAMES ── */
#iframesContainer { flex:1; width:100%; height:100%; position:relative; }
.iframe-container {
    position:absolute; inset:0;
    opacity:0; visibility:hidden;
    transition:opacity .25s ease, visibility .25s ease;
}
.iframe-container.active { opacity:1; visibility:visible; }
.iframe-container iframe { width:100%; height:100%; border:none; display:block; }

/* loader */
.app-loader {
    position:absolute; inset:0;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    z-index:5; transition:opacity .3s ease;
}
.app-loader.done { opacity:0; pointer-events:none; }
.app-loader-spinner {
    width:40px; height:40px;
    border:3px solid rgba(255,82,29,.15);
    border-top-color:var(--primary);
    border-radius:50%; animation:splashSpin .8s linear infinite;
}

/* ════════════════════════════════════════════════════
   MODAL LOGOUT
════════════════════════════════════════════════════ */
.modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.55); backdrop-filter:blur(6px);
    align-items:center; justify-content:center;
    z-index:100000;
    animation:modalFadeIn .18s ease forwards;
    opacity:0;
}
.modal-overlay.show { display:flex; }
@keyframes modalFadeIn{to{opacity:1}}

.modal-content {
    background:var(--surface);
    border:1px solid var(--border-md);
    border-radius:var(--radius-xl);
    padding:32px 28px 24px;
    max-width:400px; width:95%;
    box-shadow:0 24px 60px rgba(0,0,0,.25);
    transform:scale(.94);
    animation:scaleIn .18s ease forwards;
    position:relative;
}
@keyframes scaleIn{to{transform:scale(1)}}

.modal-content h3 {
    font-size:16px; font-weight:700;
    color:var(--text); margin-bottom:8px;
}
.modal-content p {
    font-size:13.5px; color:var(--text-2);
    line-height:1.6; margin-bottom:24px;
}
.close-modal {
    position:absolute; top:14px; right:14px;
    background:none; border:none; cursor:pointer;
    color:var(--text-3); font-size:18px;
    width:28px; height:28px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    transition:background .14s, color .14s;
}
.close-modal:hover { background:var(--surface-2); color:var(--text); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
.modal-btn {
    padding:9px 20px; border-radius:var(--radius);
    font-size:13px; font-weight:600; font-family:inherit;
    cursor:pointer; border:none;
    transition:opacity .15s, transform .15s;
}
.modal-btn:hover { opacity:.88; transform:translateY(-1px); }
.modal-btn.danger { background:var(--red); color:#fff; }
.modal-btn.ghost  { background:var(--surface-2); color:var(--text-2); border:1px solid var(--border-md); }

.hidden { display:none !important; }

/* ════════════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════════════ */
@media(max-width:768px){
    .sidebar.expanded { position:fixed; top:0; left:0; height:100vh; z-index:300; }
    .topbar-user-name { display:none; }
    .welcome-modules-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px){
    .welcome-modules-grid { grid-template-columns:1fr 1fr; gap:8px; }
    .welcome-screen { padding:24px 16px; }
}

<!-- ══════════════════════════════════════════════════
     SCRIPT — lógica preservada, UI atualizada
══════════════════════════════════════════════════ -->
<script>
    const API_URL = window.location.origin + '/api';

    /* ── PERMISSÕES ── */
    const SECTOR_PERMISSIONS = {
        'Administrador': ['usuarios','pregões','tabela-precos','compra','transportadoras','cotacoes-frete','faturamento','estoque','controle-frete','receber','vendas','pagamento','lucro-real','financeiro','comercial'],
        'Vendas':        ['pregões','tabela-precos','compra','transportadoras','cotacoes-frete','faturamento','estoque','controle-frete','comercial'],
        'Financeiro':    ['pregões','transportadoras','faturamento','controle-frete','receber','pagamento','comercial'],
        'Almoxarifado':  ['transportadoras','cotacoes-frete','faturamento','estoque','controle-frete','comercial'],
    };
    const USER_SPECIFIC_PERMISSIONS = {
        'vendas2': ['pregões','tabela-precos','compra','transportadoras','cotacoes-frete','faturamento','estoque','controle-frete','comercial','vendas-miguel'],
        'vendas':  ['pregões','tabela-precos','compra','transportadoras','cotacoes-frete','faturamento','estoque','controle-frete','comercial','vendas-isaque'],
    };

    /* ── ÍCONES SVG ── */
    const MODULE_ICONS = {
        'pregões':         `<svg viewBox="0 0 24 24"><path d="m14 13-8.381 8.38a1 1 0 0 1-3.001-3l8.384-8.381"/><path d="m16 16 6-6"/><path d="m21.5 10.5-8-8"/><path d="m8 8 6-6"/><path d="m8.5 7.5 8 8"/></svg>`,
        'tabela-precos':   `<svg viewBox="0 0 24 24"><path d="M11 13H7"/><path d="M19 9h-4"/><path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="15" y="5" width="4" height="12" rx="1"/><rect x="7" y="8" width="4" height="9" rx="1"/></svg>`,
        'compra':          `<svg viewBox="0 0 24 24"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
        'transportadoras': `<svg viewBox="0 0 24 24"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>`,
        'cotacoes-frete':  `<svg viewBox="0 0 24 24"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"/><path d="m7.5 4.27 9 5.15"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" x2="12" y1="22" y2="12"/><circle cx="18.5" cy="15.5" r="2.5"/><path d="M20.27 17.27 22 19"/></svg>`,
        'faturamento':     `<svg viewBox="0 0 24 24"><path d="M4 11V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-1"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M2 15h10"/><path d="m9 18 3-3-3-3"/></svg>`,
        'estoque':         `<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
        'controle-frete':  `<svg viewBox="0 0 24 24"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>`,
        'receber':         `<svg viewBox="0 0 24 24"><path d="M12 18H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5"/><path d="m16 19 3 3 3-3"/><path d="M18 12h.01"/><path d="M19 16v6"/><path d="M6 12h.01"/><circle cx="12" cy="12" r="2"/></svg>`,
        'vendas':          `<svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
        'vendas-miguel':   `<svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
        'vendas-isaque':   `<svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
        'pagamento':       `<svg viewBox="0 0 24 24"><path d="M12 18H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5"/><path d="M18 12h.01"/><path d="M19 22v-6"/><path d="m22 19-3-3-3 3"/><path d="M6 12h.01"/><circle cx="12" cy="12" r="2"/></svg>`,
        'lucro-real':      `<svg viewBox="0 0 24 24"><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>`,
    };

    /* ── MÓDULOS ── */
    const MODULES = [
        { id:'pregões',         name:'Licitações',             url:'https://pregoes.onrender.com',              available:true },
        { id:'tabela-precos',   name:'Tabela de Preços',       url:'https://tabela-precos-udyp.onrender.com',   available:true },
        { id:'compra',          name:'Ordens de Compra',       url:'https://ordem-compra.onrender.com',         available:true },
        { id:'transportadoras', name:'Transportadoras',        url:'https://transportadoras.onrender.com',      available:true },
        { id:'cotacoes-frete',  name:'Cotações de Frete',      url:'https://cotacoes-frete-aikc.onrender.com',  available:true },
        { id:'faturamento',     name:'Ped. Faturamento',       url:'https://pedido-faturamento.onrender.com',   available:true },
        { id:'estoque',         name:'Estoque',                url:'https://controle-estoque-0eme.onrender.com',available:true },
        { id:'controle-frete',  name:'Controle de Frete',      url:'https://controle-frete.onrender.com',       available:true },
        { id:'receber',         name:'Contas a Receber',       url:'https://contas-receber-m1xw.onrender.com',  available:true },
        { id:'vendas',          name:'Vendas',                 url:'https://vendas-qdpf.onrender.com',          available:true },
        { id:'vendas-miguel',   name:'Vendas',                 url:'https://vendas-miguel.onrender.com',        available:true },
        { id:'vendas-isaque',   name:'Vendas',                 url:'https://vendas-isaque.onrender.com',        available:true },
        { id:'pagamento',       name:'Contas a Pagar',         url:'https://contas-a-pagar-ytr6.onrender.com',  available:true },
        { id:'lucro-real',      name:'Lucro Real',             url:'https://lucro-real.onrender.com',           available:true },
    ];

    let deviceToken        = null;
    let publicIP           = null;
    let currentSessionInfo = null;
    let activeModuleId     = null;
    let sidebarExpanded    = false;

    /* ── HELPERS ── */
    function getUserPermissions(si) {
        const u = si.username?.toLowerCase();
        if (USER_SPECIFIC_PERMISSIONS[u]) return USER_SPECIFIC_PERMISSIONS[u];
        return SECTOR_PERMISSIONS[si.sector || ''] || [];
    }

    function getGreeting() {
        const h = new Date(new Date().toLocaleString('en-US', { timeZone:'America/Sao_Paulo', hour12:false })).getHours();
        return h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
    }

    function getOrCreateDeviceToken() {
        let t = localStorage.getItem('irDeviceToken');
        if (!t) { t = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); localStorage.setItem('irDeviceToken', t); }
        return t;
    }

    async function getPublicIP() {
        try { const r = await fetch(`${API_URL}/ip`); return (await r.json()).ip; } catch { return null; }
    }

    function showMessage(msg, type='error') {
        const b = document.getElementById('messageBox');
        b.textContent = msg; b.className = `message ${type} show`;
        setTimeout(() => b.classList.remove('show'), 5000);
    }

    function togglePassword() {
        const i = document.getElementById('password');
        const b = document.querySelector('.toggle-password');
        i.type = i.type === 'password' ? 'text' : 'password';
        b.textContent = i.type === 'password' ? 'MOSTRAR' : 'OCULTAR';
    }

    /* ── SIDEBAR TOGGLE ── */
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sidebarExpanded = !sidebarExpanded;
        sb.classList.toggle('expanded', sidebarExpanded);
    }

    /* ── LOGOUT ── */
    function showLogoutModal()  { document.getElementById('logoutModal').classList.add('show'); }
    function closeLogoutModal() { document.getElementById('logoutModal').classList.remove('show'); }

    async function confirmLogout() {
        closeLogoutModal();
        try {
            const si = JSON.parse(sessionStorage.getItem('irUserSession'));
            if (si) await fetch(`${API_URL}/logout`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ sessionToken:si.sessionToken, deviceToken:si.deviceToken }) });
        } catch {}
        performLogout();
    }

    function performLogout() {
        sessionStorage.removeItem('irUserSession');
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('password').value = '';
        document.getElementById('iframesContainer').innerHTML = '';
        document.getElementById('welcomeScreen').classList.remove('hidden-smooth');
        document.getElementById('sidebar').classList.remove('expanded');
        sidebarExpanded = false;
    }

    /* ── BREADCRUMB ── */
    function setBreadcrumb(name) {
        document.getElementById('topbarModule').textContent = name || 'Início';
    }

    /* ── LOAD SIDEBAR MODULES ── */
    function loadSidebarModules(si) {
        const container = document.getElementById('sidebarModules');
        container.innerHTML = '';
        const perms = getUserPermissions(si);
        MODULES.forEach(m => {
            if (!perms.includes(m.id)) return;
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.id = `module-${m.id}`;
            item.setAttribute('data-tooltip', m.name);
            const icon = MODULE_ICONS[m.id] || MODULE_ICONS['vendas'];
            const nb = m.isNew ? '<span class="badge-new">Novo</span>' : '';
            item.innerHTML = `<span class="nav-icon">${icon}</span><span class="nav-label">${m.name}${nb}</span>`;
            if (m.available && m.url) {
                item.addEventListener('click', () => openModule(m));
            } else {
                item.style.opacity = '.35'; item.style.cursor = 'not-allowed';
            }
            container.appendChild(item);
        });
    }

    /* ── LOAD WELCOME MODULES ── */
    function loadWelcomeModules(si) {
        const grid = document.getElementById('welcomeModulesGrid');
        grid.innerHTML = '';
        const perms = getUserPermissions(si);
        MODULES.forEach(m => {
            if (!perms.includes(m.id)) return;
            const card = document.createElement('div');
            card.className = 'welcome-module-card';
            const icon = MODULE_ICONS[m.id] || MODULE_ICONS['vendas'];
            const nb = m.isNew ? '<span class="badge-new">Novo</span>' : '';
            card.innerHTML = `
                <div class="card-icon-wrap">${icon}</div>
                <span class="card-label">${m.name}${nb}</span>`;
            if (!m.available || !m.url) {
                card.classList.add('unavailable');
            } else {
                card.addEventListener('click', () => openModule(m));
            }
            grid.appendChild(card);
        });
    }

    /* ── OPEN MODULE ── */
    function openModule(module) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const si = document.getElementById(`module-${module.id}`);
        if (si) si.classList.add('active');

        document.getElementById('welcomeScreen').classList.add('hidden-smooth');
        setBreadcrumb(module.name);

        let ic = document.getElementById(`iframe-${module.id}`);
        if (!ic) {
            const params = new URLSearchParams({ sessionToken: currentSessionInfo.sessionToken });
            ic = document.createElement('div');
            ic.className = 'iframe-container';
            ic.id = `iframe-${module.id}`;

            const loader = document.createElement('div');
            loader.className = 'app-loader';
            loader.innerHTML = '<div class="app-loader-spinner"></div>';
            ic.appendChild(loader);

            const iframe = document.createElement('iframe');
            iframe.src   = `${module.url}?${params}`;
            iframe.title = module.name;
            iframe.addEventListener('load', () => {
                setTimeout(() => { loader.classList.add('done'); setTimeout(() => loader.remove(), 400); }, 2800);
            });
            ic.appendChild(iframe);
            document.getElementById('iframesContainer').appendChild(ic);
        }

        document.querySelectorAll('.iframe-container').forEach(c => c.classList.remove('active'));
        setTimeout(() => ic.classList.add('active'), 40);
        activeModuleId = module.id;
    }

    /* ── SHOW DASHBOARD ── */
    function showDashboard(si) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').style.display = 'block';

        const name   = si.name || si.username;
        const sector = si.sector || '';
        const initial = name.charAt(0).toUpperCase();

        document.getElementById('topbarUserName').textContent = name;
        document.getElementById('topbarAvatar').textContent   = initial;
        document.getElementById('welcomeGreeting').textContent = `${getGreeting()}, ${name}`;

        loadSidebarModules(si);
        loadWelcomeModules(si);

        const splash = document.getElementById('splashWelcome');
        if (splash) {
            splash.style.animation = 'fadeOut .4s ease 2s forwards';
            setTimeout(() => { if (splash.parentNode) splash.remove(); }, 2500);
        }
    }

    /* ── LOGIN FORM ── */
    document.getElementById('loginForm').addEventListener('submit', async e => {
        e.preventDefault();
        const username  = document.getElementById('username').value.toLowerCase().trim();
        const password  = document.getElementById('password').value;
        const loginBtn  = document.getElementById('loginBtn');
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="btn-spinner"></span> Autenticando...';
        try {
            const res  = await fetch(`${API_URL}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username, password, deviceToken }) });
            const data = await res.json();
            if (!res.ok) { showMessage(data.message || data.error || 'Erro ao fazer login'); return; }
            if (data.success && data.session) {
                sessionStorage.setItem('irUserSession', JSON.stringify(data.session));
                currentSessionInfo = data.session;
                showDashboard(data.session);
            }
        } catch { showMessage('Erro ao realizar login. Tente novamente.'); }
        finally  { loginBtn.disabled = false; loginBtn.innerHTML = 'ENTRAR'; }
    });

    /* ── VERIFY SESSION ── */
    async function verifySession(token) {
        try {
            const r = await fetch(`${API_URL}/verify-session`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ sessionToken:token }) });
            return (await r.json()).valid === true;
        } catch { return false; }
    }

    /* ── INIT ── */
    async function init() {
        try {
            deviceToken = getOrCreateDeviceToken();
            publicIP    = await getPublicIP();
            const stored = sessionStorage.getItem('irUserSession');
            if (stored) {
                const session = JSON.parse(stored);
                if (await verifySession(session.sessionToken)) {
                    currentSessionInfo = session;
                    showDashboard(session);
                } else sessionStorage.removeItem('irUserSession');
            }
        } catch (e) { console.error('Init error:', e); }
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
